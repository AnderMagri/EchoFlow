<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoFlow — Audit Results</title>
  <link rel="stylesheet" href="results.css">
</head>
<body>
  <!-- Toolbar -->
  <header class="toolbar">
    <div class="toolbar-left">
      <div class="toolbar-logo">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="9" fill="#00C9A7"/>
          <path d="M6 10L9 13L14 7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="toolbar-brand">EchoFlow</span>
      </div>
      <span class="toolbar-sep">|</span>
      <a id="audit-url" class="toolbar-url" href="#" target="_blank"></a>
      <span id="audit-badge" class="badge"></span>
      <span id="audit-page-type" class="badge badge-secondary" style="display:none;"></span>
      <span id="audit-device" class="badge badge-device"></span>
      <span id="audit-time" class="toolbar-time"></span>
    </div>
    <div class="toolbar-right">
      <button id="btn-settings" class="toolbar-btn" title="API Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 10a2 2 0 100-4 2 2 0 000 4z" stroke="currentColor" stroke-width="1.5"/><path d="M13.5 8a5.5 5.5 0 01-.3 1.8l1.3 1-1.5 2.6-1.5-.7a5.5 5.5 0 01-1.5.9V15h-3v-1.4a5.5 5.5 0 01-1.5-.9l-1.5.7L2.5 10.8l1.3-1A5.5 5.5 0 013.5 8c0-.6.1-1.2.3-1.8l-1.3-1L4 2.6l1.5.7A5.5 5.5 0 017 2.4V1h3v1.4c.6.2 1 .5 1.5.9l1.5-.7 1.5 2.6-1.3 1c.2.6.3 1.2.3 1.8z" stroke="currentColor" stroke-width="1.2"/></svg>
        Settings
      </button>
      <button id="btn-import" class="toolbar-btn" title="Import Audit">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0l-3-3m3 3l3-3M3 12v1a1 1 0 001 1h8a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Import
      </button>
      <button id="btn-save" class="toolbar-btn" title="Save .echoflow file">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13 14H3a1 1 0 01-1-1V3a1 1 0 011-1h7l4 4v7a1 1 0 01-1 1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 14V9H5v5M5 2v3h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Save
      </button>
      <button id="btn-copy-all" class="toolbar-btn" title="Copy All Findings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3a1 1 0 011-1h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Copy All
      </button>
      <div class="toolbar-dropdown">
        <button id="btn-export" class="toolbar-btn toolbar-btn-accent" title="Export">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0l-3-3m3 3l3-3M3 12v1a1 1 0 001 1h8a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Export
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none" style="margin-left:4px;"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div id="export-menu" class="dropdown-menu">
          <button class="dropdown-item" id="btn-export-figma">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M5 1h3v4.5H5a2.25 2.25 0 010-4.5z" stroke="currentColor" stroke-width="1.3"/><path d="M8 1h3a2.25 2.25 0 010 4.5H8V1z" stroke="currentColor" stroke-width="1.3"/><path d="M8 5.5h3a2.25 2.25 0 010 4.5H8V5.5z" stroke="currentColor" stroke-width="1.3"/><path d="M5 5.5h3V10H5a2.25 2.25 0 010-4.5z" stroke="currentColor" stroke-width="1.3"/><path d="M5 10h3v2.25A2.25 2.25 0 015.75 14.5h-.5A2.25 2.25 0 013 12.25v0C3 11.01 3.76 10 5 10z" stroke="currentColor" stroke-width="1.3"/></svg>
            Figma Presentation
          </button>
          <button class="dropdown-item" id="btn-export-pdf">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 1h6l4 4v9a1 1 0 01-1 1H4a1 1 0 01-1-1V2a1 1 0 011-1z" stroke="currentColor" stroke-width="1.3"/><path d="M10 1v4h4" stroke="currentColor" stroke-width="1.3"/></svg>
            PDF Report
          </button>
          <button class="dropdown-item" id="btn-export-csv">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="1" stroke="currentColor" stroke-width="1.3"/><line x1="1" y1="6" x2="15" y2="6" stroke="currentColor" stroke-width="1.3"/><line x1="1" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="1.3"/><line x1="6" y1="2" x2="6" y2="14" stroke="currentColor" stroke-width="1.3"/></svg>
            CSV Spreadsheet
          </button>
          <button class="dropdown-item" id="btn-export-md">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 10V6l2 2.5L8 6v4M10 10V6l2.5 2L10 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Markdown
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <!-- Left: Screenshot + Markers -->
    <div class="screenshot-panel">
      <div id="screenshot-container" class="screenshot-container">
        <img id="screenshot-img" class="screenshot-img" alt="Page screenshot">
        <div id="markers-layer" class="markers-layer"></div>
      </div>
    </div>

    <!-- Right: Tabs -->
    <div class="results-panel">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="rules">
          Rules <span id="findings-count" class="tab-count">0</span>
        </button>
        <button class="tab-btn" data-tab="ai">AI Analysis</button>
      </div>

      <!-- Rules Tab -->
      <div id="tab-rules" class="tab-content active">
        <div class="findings-header">
          <select id="sort-select">
            <option value="number">Order</option>
            <option value="ice-desc">ICE (High → Low)</option>
            <option value="ice-asc">ICE (Low → High)</option>
            <option value="category">Category</option>
          </select>
        </div>
        <div id="findings-list" class="findings-list"></div>
      </div>

      <!-- AI Tab -->
      <div id="tab-ai" class="tab-content">
        <div class="ai-container">
          <div id="ai-placeholder" class="ai-placeholder">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="#00C9A7" stroke-width="2" stroke-dasharray="4 4"/><path d="M14 20h12M20 14v12" stroke="#00C9A7" stroke-width="2" stroke-linecap="round"/></svg>
            <p>Run AI analysis for deeper insights and prioritized recommendations.</p>
            <div class="audit-context-wrap">
              <label class="audit-context-label" for="audit-context">Audit Context <span class="optional-hint">(optional)</span></label>
              <textarea id="audit-context" class="audit-context" rows="3" placeholder="Add context for the AI — e.g. &quot;Focus on checkout conversion&quot;, &quot;This is a redesign, compare to competitors&quot;, &quot;The client wants to improve mobile engagement&quot;..."></textarea>
            </div>
            <button id="btn-run-ai" class="btn-ai">Analyze with AI</button>
          </div>
          <div id="ai-loading" class="ai-loading" style="display:none;">
            <div class="spinner-ring"></div>
            <p>Analyzing audit data...</p>
          </div>
          <div id="ai-result" class="ai-result" style="display:none;"></div>
          <div id="ai-error" class="ai-error" style="display:none;"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3>Settings</h3>
      <label class="settings-label">AI Provider</label>
      <select id="provider-select" class="settings-input">
        <option value="claude">Claude (Anthropic)</option>
        <option value="gemini">Gemini (Google)</option>
      </select>
      <div id="claude-key-group">
        <label class="settings-label">Anthropic API Key</label>
        <input type="password" id="claude-key-input" class="settings-input" placeholder="sk-ant-...">
      </div>
      <div id="gemini-key-group" style="display:none;">
        <label class="settings-label">Gemini API Key</label>
        <input type="password" id="gemini-key-input" class="settings-input" placeholder="AIza...">
      </div>
      <p class="settings-hint">Keys are stored locally and only sent to the selected provider's API.</p>

      <hr class="settings-divider">
      <h4 class="settings-section-title">Presentation Export</h4>

      <label class="settings-label">Frame Size</label>
      <select id="pres-frame-size" class="settings-input">
        <option value="1920x1080">1920 x 1080 (16:9)</option>
        <option value="1280x720">1280 x 720 (16:9)</option>
        <option value="1600x900">1600 x 900 (16:9)</option>
        <option value="custom">Custom</option>
      </select>
      <div id="pres-custom-size" style="display:none;" class="settings-row">
        <input type="number" id="pres-width" class="settings-input settings-input-half" placeholder="Width" value="1920">
        <span class="settings-x">x</span>
        <input type="number" id="pres-height" class="settings-input settings-input-half" placeholder="Height" value="1080">
      </div>

      <label class="settings-label">Background Color</label>
      <div class="settings-row">
        <input type="color" id="pres-bg-color" class="settings-color" value="#000000">
        <input type="text" id="pres-bg-hex" class="settings-input settings-input-color" value="#000000" maxlength="7">
      </div>

      <label class="settings-label">Layout</label>
      <div class="pres-layout-options">
        <label class="pres-layout-option">
          <input type="radio" name="pres-layout" value="screenshot-left" checked>
          <span class="pres-layout-preview">
            <span class="pres-col pres-col-img"></span>
            <span class="pres-col pres-col-txt"></span>
          </span>
          <span class="pres-layout-name">Screenshot | Content</span>
        </label>
        <label class="pres-layout-option">
          <input type="radio" name="pres-layout" value="screenshot-right">
          <span class="pres-layout-preview">
            <span class="pres-col pres-col-txt"></span>
            <span class="pres-col pres-col-img"></span>
          </span>
          <span class="pres-layout-name">Content | Screenshot</span>
        </label>
      </div>

      <div class="modal-actions">
        <button id="btn-save-settings" class="btn-primary-sm">Save</button>
        <button id="btn-cancel-settings" class="btn-secondary-sm">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Hidden file input -->
  <input type="file" id="import-input" accept=".echoflow,.json" style="display:none;">

  <script src="results.js"></script>
</body>
</html>
